<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Vocabulary Master</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0;
            height: 100vh; height: 100dvh; 
            display: flex; align-items: center; justify-content: center; 
            background-color: #f0f2f5; overflow: hidden; 
        }
        #game-board { 
            background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; width: 98vw; height: 96%; display: flex; 
            flex-direction: column; padding: 1.5vh 1.5vw; position: relative;
        }

        /* HEADER */
        .header-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5vh; flex-wrap: wrap; }
        select, #new-student-btn { padding: 6px 10px; border-radius: 8px; font-size: clamp(12px, 2vmin, 15px); font-weight: bold; border: 1px solid #ccc; cursor: pointer; outline: none;}
        #new-student-btn { background: #d32f2f; color: white; border: none; }
        #voice-select { background: #e3f2fd; border-color: #2196f3; max-width: 200px; }

        /* MAIN RESPONSIVE AREA */
        .main-responsive-area {
            display: flex; flex-direction: row; flex: 1; gap: 2vw; width: 100%; overflow: hidden; align-items: stretch;
        }

        /* ================= LEVEL 1 & 2 VIEWS ================= */
        .left-half {
            flex: 0.45; display: flex; align-items: center; justify-content: center;
            background: #fcfcfc; border: 2px solid #eaeaea; border-radius: 15px; padding: 1.5vh;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }
        #image-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #word-image { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        #fallback-text { font-size: 6vmin; font-weight: bold; color: #444; display: none; }

        .right-half { flex: 0.55; display: flex; flex-direction: column; justify-content: space-between; padding: 0.5vh 0; }
        .game-area { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5vh; flex: 1; }
        #answer-box, #scrambled-box { width: 100%; min-height: 10vh; background: #fafafa; border: 1px solid #eee; border-radius: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 1.5vh; flex-wrap: wrap; }
        #answer-box { border: 2px dashed #bbb; }
        .letter-tile { background-color: #e91e63; color: white; font-size: clamp(20px, 5vmin, 40px); padding: 1vh 2.5vw; border-radius: 10px; cursor: pointer; user-select: none; box-shadow: 0 5px 0 #ad1457; transition: 0.1s; }
        .letter-tile:active { transform: translateY(3px); box-shadow: 0 2px 0 #ad1457; }
        .tile-correct { background-color: #34a853 !important; box-shadow: 0 5px 0 #2d8a46 !important; }
        .glow-success { border: 3px solid #34a853 !important; background-color: #f0fff4 !important; transition: 0.2s;}

        /* ================= LEVEL 3, 4 & 5 VIEWS ================= */
        .l3-view { display: none; flex: 1; flex-direction: row; gap: 2vw; overflow: hidden; }
        .l3-keyboard-section { flex: 0.45; background: #fff8e1; border: 2px solid #ffe082; border-radius: 15px; padding: 1.5vh; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.02);}
        .l3-keys-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
        .l3-key { background-color: #1976d2; color: white; font-size: clamp(20px, 4vmin, 32px); padding: 1vh 3vw; border-radius: 8px; cursor: pointer; user-select: none; box-shadow: 0 4px 0 #0d47a1; transition: 0.1s; border:none; font-weight:bold;}
        .l3-key.matra-key { background-color: #f57c00; box-shadow: 0 4px 0 #e65100; }
        .l3-key:active { transform: translateY(3px); box-shadow: 0 1px 0 #0d47a1; }
        
        .l3-board-section { flex: 0.55; display: flex; flex-direction: column; gap: 1.5vh; justify-content: space-between; }
        .l3-box { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 1.5vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 12vh; position: relative;}
        .l3-target-box { border-color: #90caf9; background: #e3f2fd; }
        .l3-completed-box { border-color: #a5d6a7; background: #e8f5e9; flex:1; align-items: stretch;}
        .l3-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 5px; width:100%; text-align:left;}
        .l3-word-pill { background: white; border: 2px solid #ccc; padding: 5px 15px; border-radius: 20px; font-size: clamp(18px, 4vmin, 26px); font-weight: bold; margin: 4px; display: inline-block; }
        .l3-workbench-area { display: flex; gap: 10px; width: 100%; align-items: center; justify-content: center; }
        #l3-workbench { background: white; border: 3px dashed #bbb; font-size: clamp(24px, 6vmin, 40px); font-weight: bold; height: 8vh; width: 70%; border-radius: 12px; display: flex; align-items: center; justify-content: center; color:#d32f2f;}
        
        /* Action Buttons */
        .action-btn { color: white; border: none; font-size: clamp(18px, 4vmin, 24px); height: 8vh; padding: 0 2vw; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .action-btn:active { transform: translateY(3px); }
        #l3-backspace { background: #757575; box-shadow: 0 4px 0 #424242; }
        #l3-submit-btn { background: #1976d2; box-shadow: 0 4px 0 #0d47a1; display: none; }
        #l5-listen-btn { background: #9c27b0; box-shadow: 0 4px 0 #6a1b9a; font-size: clamp(20px, 5vmin, 30px); padding: 15px 30px; display: none; animation: pulse 2s infinite; border-radius: 15px;}
        
        .finish-btn-style { background: #ff9800; box-shadow: 0 4px 0 #e65100; font-size: clamp(14px, 2.5vmin, 18px); padding: 8px 20px; position: absolute; top: 10px; right: 10px; border-radius: 8px; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.1s; z-index: 10;}
        .finish-btn-style:active { transform: translateY(3px); box-shadow: 0 1px 0 #e65100; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* CONTROLS */
        .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; min-height: 40px; }
        button { color: white; border: none; padding: 1.2vh 2vw; font-size: clamp(12px, 2vmin, 16px); font-weight: bold; cursor: pointer; border-radius: 8px; }
        #back-btn { background: #607d8b; display: none; }
        #clear-btn { background: #f4b400; display: none; } 
        #skip-btn { background: #9c27b0; display: none; }
        #pronounce-btn { background: #1a73e8; display: none; } 
        #next-btn { background: #34a853; display: none; }

        #status-message { height: 25px; font-size: clamp(16px, 3vmin, 22px); font-weight: bold; text-align: center; width: 100%; transition: 0.2s;}

        /* STATS & OVERLAYS */
        .stats-container { width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #eee; padding-top: 1vh; margin-top: auto;}
        .stats { width: 100%; display: flex; justify-content: space-around; align-items: center; font-size: clamp(13px, 2.5vmin, 18px); font-weight: bold; gap: 5px; }
        #marks-display { color: #d32f2f; background: #ffebee; padding: 5px 12px; border-radius: 8px; }
        #timer-display { color: #1976d2; background: #e3f2fd; padding: 5px 12px; border-radius: 8px; }
        #voice-debug { font-size: 11px; color: #888; margin-top: 0.5vh; }
        
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #e91e63; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border-radius: 15px;}
        .overlay-title { font-size: clamp(24px, 6vmin, 40px); color: #2e7d32; font-weight: bold; text-align: center; padding: 10px;}
        .overlay-btn { font-size: 20px; font-weight: bold; padding: 12px 30px; border-radius: 10px; cursor: pointer; border: none; color: white; transition: 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.2);}
        .overlay-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2);}
        .btn-yes { background: #34a853; }
        .btn-no { background: #d32f2f; }
        .btn-play { background: #1976d2; }
