<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Vocabulary Master</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0;
            height: 100vh; height: 100dvh; 
            display: flex; align-items: center; justify-content: center; 
            background-color: #f0f2f5; overflow: hidden; 
        }
        #game-board { 
            background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; width: 98vw; height: 96%; display: flex; 
            flex-direction: column; padding: 1.5vh 1.5vw; position: relative;
        }

        /* HEADER */
        .header-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5vh; flex-wrap: wrap; }
        select, #new-student-btn { padding: 6px 10px; border-radius: 8px; font-size: clamp(12px, 2vmin, 15px); font-weight: bold; border: 1px solid #ccc; cursor: pointer; outline: none;}
        #new-student-btn { background: #d32f2f; color: white; border: none; }
        #voice-select { background: #e3f2fd; border-color: #2196f3; max-width: 150px; }

        /* MAIN RESPONSIVE AREA */
        .main-responsive-area {
            display: flex; flex-direction: row; flex: 1; gap: 2vw; width: 100%; overflow: hidden; align-items: stretch;
        }

        /* ================= LEVEL 1 & 2 VIEWS ================= */
        .left-half {
            flex: 0.45; display: flex; align-items: center; justify-content: center;
            background: #fcfcfc; border: 2px solid #eaeaea; border-radius: 15px; padding: 1.5vh;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }
        #image-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #word-image { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        #fallback-text { font-size: 6vmin; font-weight: bold; color: #444; display: none; }

        .right-half { flex: 0.55; display: flex; flex-direction: column; justify-content: space-between; padding: 0.5vh 0; }
        .game-area { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5vh; flex: 1; }
        #answer-box, #scrambled-box { width: 100%; min-height: 10vh; background: #fafafa; border: 1px solid #eee; border-radius: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 1.5vh; flex-wrap: wrap; }
        #answer-box { border: 2px dashed #bbb; }
        .letter-tile { background-color: #e91e63; color: white; font-size: clamp(20px, 5vmin, 40px); padding: 1vh 2.5vw; border-radius: 10px; cursor: pointer; user-select: none; box-shadow: 0 5px 0 #ad1457; transition: 0.1s; }
        .letter-tile:active { transform: translateY(3px); box-shadow: 0 2px 0 #ad1457; }
        .tile-correct { background-color: #34a853 !important; box-shadow: 0 5px 0 #2d8a46 !important; }
        .glow-success { border: 3px solid #34a853 !important; background-color: #f0fff4 !important; transition: 0.2s;}

        /* ================= LEVEL 3 VIEWS ================= */
        .l3-view { display: none; flex: 1; flex-direction: row; gap: 2vw; overflow: hidden; }
        .l3-keyboard-section { flex: 0.45; background: #fff8e1; border: 2px solid #ffe082; border-radius: 15px; padding: 1.5vh; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.02);}
        .l3-keys-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
        .l3-key { background-color: #1976d2; color: white; font-size: clamp(20px, 4vmin, 32px); padding: 1vh 3vw; border-radius: 8px; cursor: pointer; user-select: none; box-shadow: 0 4px 0 #0d47a1; transition: 0.1s; border:none; font-weight:bold;}
        .l3-key.matra-key { background-color: #f57c00; box-shadow: 0 4px 0 #e65100; }
        .l3-key:active { transform: translateY(3px); box-shadow: 0 1px 0 #0d47a1; }
        
        .l3-board-section { flex: 0.55; display: flex; flex-direction: column; gap: 1.5vh; justify-content: space-between; }
        .l3-box { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 1.5vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 12vh;}
        .l3-target-box { border-color: #90caf9; background: #e3f2fd; }
        .l3-completed-box { border-color: #a5d6a7; background: #e8f5e9; flex:1;}
        .l3-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 5px; width:100%; text-align:left;}
        .l3-word-pill { background: white; border: 2px solid #ccc; padding: 5px 15px; border-radius: 20px; font-size: clamp(18px, 4vmin, 26px); font-weight: bold; margin: 4px; display: inline-block; }
        .l3-workbench-area { display: flex; gap: 10px; width: 100%; align-items: center; justify-content: center; }
        #l3-workbench { background: white; border: 3px dashed #bbb; font-size: clamp(24px, 6vmin, 40px); font-weight: bold; height: 8vh; width: 70%; border-radius: 12px; display: flex; align-items: center; justify-content: center; color:#d32f2f;}
        #l3-backspace { background: #757575; color: white; border: none; font-size: clamp(18px, 4vmin, 24px); height: 8vh; padding: 0 2vw; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #424242; font-weight: bold;}
        #l3-backspace:active { transform: translateY(3px); box-shadow: 0 1px 0 #424242; }

        /* CONTROLS */
        .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; min-height: 40px; }
        button { color: white; border: none; padding: 1.2vh 2vw; font-size: clamp(12px, 2vmin, 16px); font-weight: bold; cursor: pointer; border-radius: 8px; }
        #back-btn { background: #607d8b; display: none; }
        #clear-btn { background: #f4b400; display: none; } 
        #skip-btn { background: #9c27b0; display: none; }
        #pronounce-btn { background: #1a73e8; display: none; } 
        #next-btn { background: #34a853; display: none; }

        #status-message { height: 25px; font-size: clamp(16px, 3vmin, 22px); font-weight: bold; text-align: center; width: 100%; transition: 0.2s;}

        /* STATS & CELEBRATION */
        .stats-container { width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #eee; padding-top: 1vh; margin-top: auto;}
        .stats { width: 100%; display: flex; justify-content: space-around; align-items: center; font-size: clamp(13px, 2.5vmin, 18px); font-weight: bold; gap: 5px; }
        #marks-display { color: #d32f2f; background: #ffebee; padding: 5px 12px; border-radius: 8px; }
        #timer-display { color: #1976d2; background: #e3f2fd; padding: 5px 12px; border-radius: 8px; }
        #voice-debug { font-size: 11px; color: #888; margin-top: 0.5vh; }
        
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #e91e63; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #celebration-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border-radius: 15px;}
        #celebration-text { font-size: clamp(24px, 6vmin, 40px); color: #2e7d32; font-weight: bold; text-align: center; padding: 20px;}

        /* PORTRAIT MODE OVERRIDE */
        @media (orientation: portrait) {
            #game-board { padding: 1vh 2vw; }
            .header-controls { margin-bottom: 1vh; }
            .main-responsive-area, .l3-view { flex-direction: column; gap: 1vh; } 
            .left-half { flex: 0 0 30%; padding: 0.5vh; border-radius: 10px; } 
            .right-half { flex: 1; justify-content: flex-start; }
            .game-area { gap: 1vh; }
            #answer-box, #scrambled-box { min-height: 8vh; padding: 1vh; gap: 6px; } 
            .letter-tile { padding: 1vh 3vw; font-size: clamp(18px, 5vmin, 35px); }
            button { padding: 1.2vh 3vw; }
            .stats-container { padding-top: 0.5vh; }
            
            /* L3 Portrait Adjustments */
            .l3-keyboard-section { flex: 0 0 35%; padding: 1vh;}
            .l3-board-section { flex: 1; justify-content: flex-start;}
            .l3-box { min-height: 8vh; padding: 1vh;}
            .l3-key { padding: 1vh 4vw; font-size: 22px;}
            #l3-workbench { height: 7vh; font-size: 28px;}
            #l3-backspace { height: 7vh; padding: 0 4vw;}
        }

        /* EXTREME LANDSCAPE OVERRIDE */
        @media (max-height: 450px) and (orientation: landscape) {
            #game-board { padding: 1vh 1vw; }
            .header-controls { margin-bottom: 1vh; }
            .left-half { padding: 0.5vh; }
            .game-area { gap: 1vh; }
            #answer-box, #scrambled-box { min-height: 8vh; padding: 0.5vh; }
            .letter-tile { font-size: 18px; padding: 1vh 1.5vw; box-shadow: 0 3px 0 #ad1457;}
            button { padding: 1vh 1.5vw; font-size: 12px; }
            .stats-container { padding-top: 0.5vh; }
            .l3-keyboard-section { padding: 0.5vh;}
            .l3-key { padding: 0.5vh 1.5vw; font-size: 18px;}
            #l3-workbench { height: 6vh; font-size: 24px;}
            #l3-backspace { height: 6vh;}
        }
    </style>
</head>

    // --- SMART TIMER LOGIC ---
    let timerSeconds = 0;
    let timerInterval = null;

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            let h = Math.floor(timerSeconds / 3600);
            let m = Math.floor((timerSeconds % 3600) / 60);
            let s = timerSeconds % 60;
            let display = (h > 0 ? (h < 10 ? "0" + h : h) + ":" : "") + (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
            document.getElementById("timer-display").innerText = "⏱️ " + display;
        }, 1000);
    }
    function pauseTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer() { pauseTimer(); timerSeconds = 0; document.getElementById("timer-display").innerText = "⏱️ 00:00"; }

    // Global Game State
    let currentMarks = 0;
    let solvedWordsGlobal = new Set();
    let synth = window.speechSynthesis;
    let manualVoice = null;
    
    // L1 & L2 State
    let currentWordList = [], currentIndex = 0, currentHindiWord = "", availableLetters = [], selectedLetters = [];
    
    // L3 State
    let l3AllWords = [], l3ActiveTarget = [], l3Completed = [];
    let l3InputText = "";

    function shuffleArray(a) { let s = [...a]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }

    function getDecoyPool(lessonKey) {
        let pool = [];
        for (let key of lessonOrder) {
            if (keyboardData[key]) pool = pool.concat(keyboardData[key].c).concat(keyboardData[key].v);
            if (key.toString() === lessonKey?.toString()) break;
        }
        return pool.length > 0 ? pool : ['क','ल','म','न','र','स'];
    }

    // ==========================================
    // MAIN NAVIGATION & SETUP
    // ==========================================
    function changeLesson() {
        const lesson = document.getElementById("lesson-select").value;
        const level = document.getElementById("level-select").value;
        
        if (level === "1" || level === "2") {
            document.getElementById("l12-view").style.display = "flex";
            document.getElementById("l3-view").style.display = "none";
            
            // Setup L1/L2
            currentWordList = shuffleArray(lessonsData[lesson].words.map(w => ({...w, lessonOrigin: lesson})));
            currentIndex = 0;
            loadWord();
        } else {
            document.getElementById("l12-view").style.display = "none";
            document.getElementById("l3-view").style.display = "flex";
            
            // Setup L3
            buildL3Keyboard(lesson);
            l3AllWords = shuffleArray([...lessonsData[lesson].l3Words]);
            l3ActiveTarget = [];
            l3Completed = [];
            l3InputText = "";
            document.getElementById("l3-workbench").innerText = "";
            document.getElementById("l3-status-message").innerText = "";
            loadNextL3Batch();
        }
    }

    function restartForNewStudent() { 
        currentMarks = 0; 
        solvedWordsGlobal.clear(); 
        document.getElementById("marks-display").innerText = `Marks: 0`;
        resetTimer(); 
        changeLesson(); 
    }

    function triggerAutoAdvance() {
        pauseTimer();
        const currentLesson = document.getElementById("lesson-select").value;
        const idx = lessonOrder.indexOf(currentLesson);
        
        const overlay = document.getElementById("celebration-overlay");
        overlay.style.display = "flex";
        clapSound.play().catch(e => console.log(e));

        if (idx < lessonOrder.length - 1) {
            document.getElementById("celebration-text").innerText = `Lesson ${currentLesson} Completed! Ready for the next one...`;
            setTimeout(() => {
                overlay.style.display = "none";
                document.getElementById("lesson-select").value = lessonOrder[idx + 1];
                changeLesson();
            }, 3000);
        } else {
            document.getElementById("celebration-text").innerText = `🏆 Congratulations! You have mastered all words!`;
            setTimeout(() => { overlay.style.display = "none"; }, 4000);
        }
    }

    // ==========================================
    // LEVEL 1 & 2 LOGIC
    // ==========================================
    function loadWord() {
        if (currentIndex >= currentWordList.length) { triggerAutoAdvance(); return; }
        
        const img = document.getElementById("word-image");
        const aBox = document.getElementById("answer-box");
        const sBox = document.getElementById("scrambled-box");
        
        aBox.classList.remove("glow-success");
        aBox.innerHTML = ""; sBox.innerHTML = "";
        document.getElementById("status-message").innerText = "";
        document.getElementById("skip-btn").style.display = "none";
        document.getElementById("clear-btn").style.display = "none";
        document.getElementById("pronounce-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("back-btn").style.display = "none";

        img.style.display = "none"; img.src = "";
        document.getElementById("fallback-text").style.display = "none";
        
        document.getElementById("loading-spinner").style.display = "block";
        pauseTimer(); 

        currentHindiWord = currentWordList[currentIndex].hi;
        document.getElementById("word-count").innerText = `${currentIndex + 1} / ${currentWordList.length}`;
        document.getElementById("marks-display").innerText = `Marks: ${currentMarks}`;

        img.src = currentWordList[currentIndex].img;
        img.onload = () => { document.getElementById("loading-spinner").style.display = "none"; img.style.display = "block"; generateTiles(); };
        img.onerror = () => { document.getElementById("loading-spinner").style.display = "none"; document.getElementById("fallback-text").innerText = currentWordList[currentIndex].en; document.getElementById("fallback-text").style.display = "block"; generateTiles(); };
    }

    function generateTiles() {
        let correctTiles = segmentHindi(currentHindiWord);
        availableLetters = shuffleArray([...correctTiles]);
        
        if (document.getElementById("level-select").value === "2") {
            let pool = getDecoyPool(currentWordList[currentIndex].lessonOrigin);
            availableLetters.push(pool[Math.floor(Math.random()*pool.length)]);
        }
        
        availableLetters = shuffleArray(availableLetters);
        selectedLetters = []; 
        document.getElementById("status-message").innerText = "";
        
        document.getElementById("skip-btn").style.display = "inline-block";
        document.getElementById("clear-btn").style.display = "inline-block";
        if (document.getElementById("voice-select").options.length > 1 || manualVoice) { document.getElementById("pronounce-btn").style.display = "inline-block"; }
        document.getElementById("back-btn").style.display = (currentIndex > 0) ? "inline-block" : "none";
        
        updateUI();
        startTimer();
    }

    function moveLetter(index, fromAvailable) {
        if (fromAvailable) { selectedLetters.push(availableLetters[index]); availableLetters.splice(index, 1); }
        else { availableLetters.push(selectedLetters[index]); selectedLetters.splice(index, 1); }
        updateUI();
        
        if (selectedLetters.join("") === currentHindiWord) {
            document.getElementById("answer-box").classList.add("glow-success");
            document.querySelectorAll("#answer-box .letter-tile").forEach(t => t.classList.add("tile-correct"));
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("skip-btn").style.display = "none";
            document.getElementById("clear-btn").style.display = "none";
            
            if (!solvedWordsGlobal.has(currentHindiWord)) {
                currentMarks += (document.getElementById("level-select").value === "1" ? 1 : 2);
                solvedWordsGlobal.add(currentHindiWord);
                document.getElementById("marks-display").innerText = `Marks: ${currentMarks}`; 
                clapSound.play().catch(e => console.log(e));
            } else {
                document.getElementById("status-message").innerText = "Already Scored! ✔️";
                document.getElementById("status-message").style.color = "#34a853";
            }
        } else if (selectedLetters.length === segmentHindi(currentHindiWord).length) {
            document.getElementById("status-message").innerText = "❌ Try again!";
            document.getElementById("status-message").style.color = "#d32f2f";
            wrongSound.play().catch(e => console.log(e));
        } else {
            document.getElementById("status-message").innerText = "";
        }
    }

    function skipWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } else { triggerAutoAdvance(); } }
    function nextWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } else { triggerAutoAdvance(); } }
    function prevWord() { if (currentIndex > 0) { currentIndex--; loadWord(); } }
    function clearAnswer() { availableLetters = [...availableLetters, ...selectedLetters]; selectedLetters = []; updateUI(); }
    
    function updateUI() {
        const sBox = document.getElementById("scrambled-box"), aBox = document.getElementById("answer-box");
        sBox.innerHTML = ""; aBox.innerHTML = "";
        availableLetters.forEach((l, i) => { const d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = () => moveLetter(i, true); sBox.appendChild(d); });
        selectedLetters.forEach((l, i) => { const d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = () => moveLetter(i, false); aBox.appendChild(d); });
    }

    // ==========================================
    // LEVEL 3 LOGIC
    // ==========================================
    function buildL3Keyboard(currentLesson) {
        let activeVowels = new Set(), activeConsonants = new Set();
        
        for (let key of lessonOrder) {
            if (keyboardData[key]) {
                keyboardData[key].v.forEach(k => activeVowels.add(k));
                keyboardData[key].c.forEach(k => activeConsonants.add(k));
            }
            if (key.toString() === currentLesson.toString()) break;
        }

        const vBox = document.getElementById("l3-vowels-keys");
        const cBox = document.getElementById("l3-cons-keys");
        vBox.innerHTML = ""; cBox.innerHTML = "";

        // Function to classify matras safely
        const isMatra = (char) => /[\u0901-\u0903\u093e-\u094c\u094d]/.test(char);

        Array.from(activeVowels).forEach(char => {
            let btn = document.createElement("button");
            btn.className = "l3-key" + (isMatra(char) ? " matra-key" : "");
            btn.innerText = char; 
            btn.onclick = () => l3KeyPress(char);
            vBox.appendChild(btn);
        });

        Array.from(activeConsonants).forEach(char => {
            let btn = document.createElement("button");
            btn.className = "l3-key";
            btn.innerText = char;
            btn.onclick = () => l3KeyPress(char);
            cBox.appendChild(btn);
        });
    }

    function loadNextL3Batch() {
        if (l3AllWords.length === 0 && l3ActiveTarget.length === 0) {
            triggerAutoAdvance();
            return;
        }
        
        while (l3ActiveTarget.length < 5 && l3AllWords.length > 0) {
            l3ActiveTarget.push(l3AllWords.shift());
        }
        
        renderL3Board();
        document.getElementById("word-count").innerText = `${l3Completed.length} / ${l3Completed.length + l3ActiveTarget.length + l3AllWords.length}`;
        startTimer();
    }

    function renderL3Board() {
        const tBox = document.getElementById("l3-target-words");
        const cBox = document.getElementById("l3-completed-words");
        
        tBox.innerHTML = "";
        l3ActiveTarget.forEach(w => {
            let span = document.createElement("span");
            span.className = "l3-word-pill";
            span.innerText = w;
            tBox.appendChild(span);
        });
        
        cBox.innerHTML = "";
        l3Completed.forEach(w => {
            let span = document.createElement("span");
            span.className = "l3-word-pill";
            span.style.background = "#c8e6c9";
            span.style.borderColor = "#81c784";
            span.style.color = "#2e7d32";
            span.innerText = w;
            cBox.appendChild(span);
        });
        
        document.getElementById("l3-workbench").innerText = l3InputText;
    }

    function l3KeyPress(char) {
        document.getElementById("l3-status-message").innerText = "";
        l3InputText += char;
        renderL3Board();
        checkL3Match();
    }

    function l3Backspace() {
        if (l3InputText.length > 0) {
            l3InputText = l3InputText.slice(0, -1);
            document.getElementById("l3-status-message").innerText = "";
            renderL3Board();
        }
    }

    function checkL3Match() {
        const matchIndex = l3ActiveTarget.indexOf(l3InputText);
        
        if (matchIndex !== -1) {
            const matchedWord = l3ActiveTarget[matchIndex];
            l3ActiveTarget.splice(matchIndex, 1);
            l3Completed.push(matchedWord);
            
            if (!solvedWordsGlobal.has(matchedWord)) {
                currentMarks += 3;
                solvedWordsGlobal.add(matchedWord);
                document.getElementById("marks-display").innerText = `Marks: ${currentMarks}`;
            }
            
            clapSound.play().catch(e => console.log(e));
            
            const wb = document.getElementById("l3-workbench");
            wb.style.background = "#e8f5e9";
            wb.style.borderColor = "#4caf50";
            wb.style.color = "#2e7d32";
            
            setTimeout(() => {
                l3InputText = "";
                wb.style.background = "white";
                wb.style.borderColor = "#bbb";
                wb.style.color = "#d32f2f";
                
                if (l3ActiveTarget.length === 0) {
                    loadNextL3Batch();
                } else {
                    renderL3Board();
                    document.getElementById("word-count").innerText = `${l3Completed.length} / ${l3Completed.length + l3ActiveTarget.length + l3AllWords.length}`;
                }
            }, 500);
        }
    }

    // SPEECH & AUDIO
    // ==========================================
    function kickstartSpeech() { synth.speak(new SpeechSynthesisUtterance(" ")); }
    
    function loadVoices() {
        const voices = synth.getVoices();
        const vSelect = document.getElementById("voice-select");
        const hindiFound = voices.some(v => v.lang.includes('hi'));
        
        if (vSelect.options.length <= 1) {
            voices.forEach((v, i) => {
                const opt = document.createElement("option");
                opt.value = i; opt.innerText = `${v.name} (${v.lang})`;
                vSelect.appendChild(opt);
            });
        }
        if (hindiFound || manualVoice) { 
            document.getElementById("pronounce-btn").style.display = "inline-block";
            document.getElementById("pronounce-btn").disabled = false;
            document.getElementById("voice-debug").innerText = "Hindi voice ready! ✔️";
        }
    }

    function manualVoiceSet() {
        const voices = synth.getVoices();
        const idx = document.getElementById("voice-select").value;
        if (idx !== "") {
            manualVoice = voices[idx];
            document.getElementById("pronounce-btn").style.display = "inline-block";
            document.getElementById("pronounce-btn").disabled = false;
        }
    }

    synth.onvoiceschanged = loadVoices;

    function pronounceWord() {
        synth.cancel(); 
        const u = new SpeechSynthesisUtterance(currentHindiWord);
        if (manualVoice) { u.voice = manualVoice; } else { u.lang = 'hi-IN'; }
        u.rate = 0.8; synth.speak(u);
    }

    window.onload = () => { 
        resetTimer();
        changeLesson(); 
        setTimeout(loadVoices, 1000); 
    };
</script>
</body>
</html>
