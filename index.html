<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Vocabulary Master</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0;
            height: 100vh; height: 100dvh; 
            display: flex; align-items: center; justify-content: center; 
            background-color: #f0f2f5; overflow: hidden; 
        }
        #game-board { 
            background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; width: 98vw; height: 96%; display: flex; 
            flex-direction: column; padding: 1.5vh 1.5vw; position: relative;
        }

        /* HEADER */
        .header-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5vh; flex-wrap: wrap; }
        select, #new-student-btn { padding: 6px 10px; border-radius: 8px; font-size: clamp(12px, 2vmin, 15px); font-weight: bold; border: 1px solid #ccc; cursor: pointer;}
        #new-student-btn { background: #d32f2f; color: white; border: none; }
        #voice-select { background: #e3f2fd; border-color: #2196f3; max-width: 150px; }

        /* WIDESCREEN AREA */
        .main-responsive-area {
            display: flex; flex-direction: row; flex: 1; gap: 2vw; width: 100%; overflow: hidden; align-items: stretch;
        }

        /* LEFT AREA (IMAGE) */
        .left-half {
            flex: 0.45; display: flex; align-items: center; justify-content: center;
            background: #fcfcfc; border: 2px solid #eaeaea; border-radius: 15px; padding: 1.5vh;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }
        #image-container { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative;
        }
        
        #word-image { 
            width: auto; height: auto; max-width: 100%; max-height: 100%; 
            object-fit: contain; border-radius: 10px; display: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        #fallback-text { font-size: 6vmin; font-weight: bold; color: #444; display: none; }

        /* RIGHT AREA (GAMEPLAY) */
        .right-half {
            flex: 0.55; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 0.5vh 0;
        }

        .game-area { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5vh; flex: 1; }

        /* BOXES */
        #answer-box, #scrambled-box { 
            width: 100%; min-height: 10vh; background: #fafafa; border: 1px solid #eee;
            border-radius: 12px; display: flex; justify-content: center; 
            align-items: center; gap: 10px; padding: 1.5vh; flex-wrap: wrap;
        }
        #answer-box { border: 2px dashed #bbb; }

        .letter-tile { 
            background-color: #e91e63; color: white; 
            font-size: clamp(20px, 5vmin, 40px); padding: 1vh 2.5vw; 
            border-radius: 10px; cursor: pointer; user-select: none; 
            box-shadow: 0 5px 0 #ad1457; transition: 0.1s; 
        }
        .letter-tile:active { transform: translateY(3px); box-shadow: 0 2px 0 #ad1457; }
        .tile-correct { background-color: #34a853 !important; box-shadow: 0 5px 0 #2d8a46 !important; }
        .glow-success { border: 3px solid #34a853 !important; background-color: #f0fff4 !important; }

        /* CONTROLS */
        .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; min-height: 40px; }
        button { color: white; border: none; padding: 1.2vh 2vw; font-size: clamp(12px, 2vmin, 16px); font-weight: bold; cursor: pointer; border-radius: 8px; }
        #back-btn { background: #607d8b; display: none; }
        #clear-btn { background: #f4b400; display: none; } 
        #skip-btn { background: #9c27b0; display: none; }
        #pronounce-btn { background: #1a73e8; display: none; } 
        #next-btn { background: #34a853; display: none; }

        #status-message { height: 25px; font-size: clamp(16px, 3vmin, 22px); font-weight: bold; text-align: center; width: 100%; transition: 0.2s;}

        /* STATS & TIMER */
        .stats-container { width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #eee; padding-top: 1vh; }
        .stats { width: 100%; display: flex; justify-content: space-around; align-items: center; font-size: clamp(13px, 2.5vmin, 18px); font-weight: bold; gap: 5px; }
        #marks-display { color: #d32f2f; background: #ffebee; padding: 5px 12px; border-radius: 8px; }
        #timer-display { color: #1976d2; background: #e3f2fd; padding: 5px 12px; border-radius: 8px; }
        #voice-debug { font-size: 11px; color: #888; margin-top: 0.5vh; }
        
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #e91e63; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PORTRAIT MODE OVERRIDE */
        @media (orientation: portrait) {
            #game-board { padding: 1vh 2vw; }
            .header-controls { margin-bottom: 1vh; }
            .main-responsive-area { flex-direction: column; gap: 1vh; } 
            .left-half { flex: 0 0 35%; padding: 0.5vh; border-radius: 10px; } 
            .right-half { flex: 1; justify-content: space-evenly; }
            .game-area { gap: 1.5vh; }
            #answer-box, #scrambled-box { min-height: 8vh; padding: 1vh; gap: 6px; } 
            .letter-tile { padding: 1vh 3vw; font-size: clamp(18px, 5vmin, 35px); }
            button { padding: 1.2vh 3vw; }
            .stats-container { padding-top: 0.5vh; }
        }

        /* EXTREME LANDSCAPE OVERRIDE */
        @media (max-height: 450px) and (orientation: landscape) {
            #game-board { padding: 1vh 1vw; }
            .header-controls { margin-bottom: 1vh; }
            .left-half { padding: 0.5vh; }
            .game-area { gap: 1vh; }
            #answer-box, #scrambled-box { min-height: 8vh; padding: 0.5vh; }
            .letter-tile { font-size: 18px; padding: 1vh 1.5vw; box-shadow: 0 3px 0 #ad1457;}
            button { padding: 1vh 1.5vw; font-size: 12px; }
            .stats-container { padding-top: 0.5vh; }
        }
    </style>
</head>

                <div id="scrambled-box"></div>

                <div class="controls">

                    <div id="marks-display">Marks: 0</div>
                </div>
                <div id="voice-debug">Click anywhere to wake audio.</div>
            </div>
        </div>
    </div>
</div>

        return rawTiles.filter(t => t.trim() !== ''); // Removes spaces turning into blank tiles
    }

        9: { letters: [], words: [{ img: "ek.jpg", hi: "एक", en: "1" }, { img: "do.jpg", hi: "दो", en: "2" }, { img: "teen.jpg", hi: "तीन", en: "3" }, { img: "char.jpg", hi: "चार", en: "4" }, { img: "panch.jpg", hi: "पाँच", en: "5" }, { img: "chah.jpg", hi: "छह", en: "6" }, { img: "saat.jpg", hi: "सात", en: "7" }, { img: "aath.jpg", hi: "आठ", en: "8" }, { img: "nau.jpg", hi: "नौ", en: "9" }, { img: "das.jpg", hi: "दस", en: "10" }, { img: "safed.jpg", hi: "सफेद", en: "White" }, { img: "laal.jpg", hi: "लाल", en: "Red" }, { img: "kesariya.jpg", hi: "केसरिया", en: "Saffron" }, { img: "neela.jpg", hi: "नीला", en: "Blue" }, { img: "kaala.jpg", hi: "काला", en: "Black" }, { img: "baingani.jpg", hi: "बैंगनी", en: "Purple" }, { img: "peela.jpg", hi: "पीला", en: "Yellow" }, { img: "hara.jpg", hi: "हरा", en: "Green" }, { img: "gulabi.jpg", hi: "गुलाबी", en: "Pink" }] },

        "flowers": { letters: [], words: [{ img: "gulab.jpg", hi: "गुलाब", en: "Rose" }, { img: "kamal.jpg", hi: "कमल", en: "Lotus" }, { img: "kevda.jpg", hi: "केवड़ा", en: "Kewra" }, { img: "chameli.jpg", hi: "चमेली", en: "Jasmine" }, { img: "champa.jpg", hi: "चंपा", en: "Champa" }, { img: "juhi.jpg", hi: "जूही", en: "Juhi" }, { img: "gudhal.jpg", hi: "गुड़हल", en: "Hibiscus" }, { img: "genda.jpg", hi: "गेंदा", en: "Marigold" }, { img: "parijat.jpg", hi: "पारिजात", en: "Parijat" }, { img: "surajmukhi.jpg", hi: "सूरज मुखी", en: "Sunflower" }] }
    };

    let currentWordList = [], currentIndex = 0, currentMarks = 0, currentHindiWord = "", availableLetters = [], selectedLetters = [], solvedWordsGlobal = new Set();
    let synth = window.speechSynthesis;
    let manualVoice = null;

    function shuffleArray(a) { let s = [...a]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }

    function getDecoyPool(lessonKey) {
        const order = [1, 2, 3, 4, 5, 6, 7, 8, 9, "animals", "veggies", "flowers"];
        let pool = [];
        for (let key of order) {
            if (lessonsData[key] && lessonsData[key].letters && lessonsData[key].letters.length > 0) pool = pool.concat(lessonsData[key].letters);
            if (key.toString() === lessonKey?.toString()) break;
        }
        return pool.length > 0 ? pool : ['क','ल','म','न','र','स'];
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerSeconds = 0;
        document.getElementById("timer-display").innerText = "⏱️ 00:00";
        timerInterval = setInterval(() => {
            timerSeconds++;
            let h = Math.floor(timerSeconds / 3600);
            let m = Math.floor((timerSeconds % 3600) / 60);
            let s = timerSeconds % 60;
            let display = "";
            if (h > 0) display += (h < 10 ? "0" + h : h) + ":";
            display += (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
            document.getElementById("timer-display").innerText = "⏱️ " + display;
        }, 1000);
    }

    function loadWord() {
        if (currentIndex >= currentWordList.length) return;
        const img = document.getElementById("word-image");
        const aBox = document.getElementById("answer-box");
        const sBox = document.getElementById("scrambled-box");
        
        aBox.classList.remove("glow-success");
        aBox.innerHTML = "";
        sBox.innerHTML = "";
        
        document.getElementById("status-message").innerText = "";
        document.getElementById("skip-btn").style.display = "none";
        document.getElementById("clear-btn").style.display = "none";
        document.getElementById("pronounce-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("back-btn").style.display = "none";

        img.style.display = "none"; img.src = "";
        document.getElementById("fallback-text").style.display = "none";
        document.getElementById("loading-spinner").style.display = "block";

        currentHindiWord = currentWordList[currentIndex].hi;
        document.getElementById("word-count").innerText = `${currentIndex + 1} / ${currentWordList.length}`;
        document.getElementById("marks-display").innerText = `Marks: ${currentMarks}`;

        img.src = currentWordList[currentIndex].img;
        
        img.onload = () => { 
            document.getElementById("loading-spinner").style.display = "none"; 
            img.style.display = "block"; 
            generateTiles();
        };
        
        img.onerror = () => { 
            document.getElementById("loading-spinner").style.display = "none"; 
            document.getElementById("fallback-text").innerText = currentWordList[currentIndex].en; 
            document.getElementById("fallback-text").style.display = "block"; 
            generateTiles();
        };
    }

    function generateTiles() {
        let correctTiles = segmentHindi(currentHindiWord);
        availableLetters = shuffleArray([...correctTiles]);
        
        if (document.getElementById("level-select").value === "2") {
            let pool = getDecoyPool(currentWordList[currentIndex].lessonOrigin || document.getElementById("lesson-select").value);
            availableLetters.push(pool[Math.floor(Math.random()*pool.length)]);
        }
        
        availableLetters = shuffleArray(availableLetters);
        selectedLetters = []; 
        document.getElementById("status-message").innerText = "";
        
        document.getElementById("skip-btn").style.display = "inline-block";
        document.getElementById("clear-btn").style.display = "inline-block";
        if (document.getElementById("voice-select").options.length > 1 || manualVoice) {
            document.getElementById("pronounce-btn").style.display = "inline-block";
        }
        document.getElementById("back-btn").style.display = (currentIndex > 0) ? "inline-block" : "none";
        
        updateUI();
    }

    function moveLetter(index, fromAvailable) {
        if (fromAvailable) { selectedLetters.push(availableLetters[index]); availableLetters.splice(index, 1); }
        else { availableLetters.push(selectedLetters[index]); selectedLetters.splice(index, 1); }
        updateUI();
        
        if (selectedLetters.join("") === currentHindiWord) {
            document.getElementById("answer-box").classList.add("glow-success");
            document.querySelectorAll("#answer-box .letter-tile").forEach(t => t.classList.add("tile-correct"));
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("skip-btn").style.display = "none";
            document.getElementById("clear-btn").style.display = "none";
            
            if (!solvedWordsGlobal.has(currentHindiWord)) {
                currentMarks += (document.getElementById("level-select").value === "1" ? 1 : 2);
                solvedWordsGlobal.add(currentHindiWord);
                document.getElementById("marks-display").innerText = `Marks: ${currentMarks}`; 
                clapSound.play().catch(e => console.log("Audio block", e));
            } else {
                document.getElementById("status-message").innerText = "Already Scored! ✔️";
                document.getElementById("status-message").style.color = "#34a853";
            }
        } else if (selectedLetters.length === segmentHindi(currentHindiWord).length) {
            document.getElementById("status-message").innerText = "❌ Try again!";
            document.getElementById("status-message").style.color = "#d32f2f";
            wrongSound.play().catch(e => console.log("Audio block", e));
        } else {
            document.getElementById("status-message").innerText = "";
        }
    }

    function skipWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } }
    function nextWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } }
    function prevWord() { if (currentIndex > 0) { currentIndex--; loadWord(); } }
    function clearAnswer() { availableLetters = [...availableLetters, ...selectedLetters]; selectedLetters = []; updateUI(); }
    
    function updateUI() {
        const sBox = document.getElementById("scrambled-box"), aBox = document.getElementById("answer-box");
        sBox.innerHTML = ""; aBox.innerHTML = "";
        availableLetters.forEach((l, i) => { const d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = () => moveLetter(i, true); sBox.appendChild(d); });
        selectedLetters.forEach((l, i) => { const d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = () => moveLetter(i, false); aBox.appendChild(d); });
    }

    function changeLesson() {
        const sel = document.getElementById("lesson-select").value;
        if (sel === 'all') {
            currentWordList = []; 
            const order = [1, 2, 3, 4, 5, 6, 7, 8, 9, "animals", "veggies", "flowers"];
            order.forEach(k => {
                if(lessonsData[k]) {
                    let tagged = lessonsData[k].words.map(w => ({...w, lessonOrigin: k}));
                    currentWordList = currentWordList.concat(shuffleArray(tagged));
                }
            });
        } else { currentWordList = shuffleArray(lessonsData[sel].words.map(w => ({...w, lessonOrigin: sel}))); }
        currentIndex = 0; loadWord();
    }

    function restartForNewStudent() { 
        currentMarks = 0; 
        solvedWordsGlobal.clear(); 
        currentIndex = 0; 
        changeLesson();
        startTimer(); 
    }

    function kickstartSpeech() { synth.speak(new SpeechSynthesisUtterance(" ")); }
    
    function loadVoices() {
        const voices = synth.getVoices();
        const vSelect = document.getElementById("voice-select");
        const hindiFound = voices.some(v => v.lang.includes('hi'));
        
        if (vSelect.options.length <= 1) {
            voices.forEach((v, i) => {
                const opt = document.createElement("option");
                opt.value = i; opt.innerText = `${v.name} (${v.lang})`;
                vSelect.appendChild(opt);
            });
        }
        if (hindiFound || manualVoice) { 
            document.getElementById("pronounce-btn").style.display = "inline-block";
            document.getElementById("pronounce-btn").disabled = false;
            document.getElementById("voice-debug").innerText = "Hindi voice ready! ✔️";
        }
    }

    function manualVoiceSet() {
        const voices = synth.getVoices();
        const idx = document.getElementById("voice-select").value;
        if (idx !== "") {
            manualVoice = voices[idx];
            document.getElementById("pronounce-btn").style.display = "inline-block";
            document.getElementById("pronounce-btn").disabled = false;
        }
    }

    synth.onvoiceschanged = loadVoices;

    function pronounceWord() {
        synth.cancel(); 
        const u = new SpeechSynthesisUtterance(currentHindiWord);
        if (manualVoice) { u.voice = manualVoice; } else { u.lang = 'hi-IN'; }
        u.rate = 0.8; synth.speak(u);
    }

    window.onload = () => { 
        changeLesson(); 
        startTimer(); 
        setTimeout(loadVoices, 1000); 
    };
</script>
