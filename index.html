<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Vocabulary Master</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0;
            height: 100vh; width: 100vw; display: flex; align-items: center; 
            justify-content: center; background-color: #f0f2f5; overflow: hidden; 
        }
        #game-board { 
            background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            text-align: center; width: 98vw; height: 96vh; display: flex; 
            flex-direction: column; padding: 1vh; position: relative;
        }

        .header-controls { display: flex; justify-content: center; gap: 5px; margin-bottom: 0.5vh; flex-wrap: wrap; }
        select, #new-student-btn { padding: 4px 8px; border-radius: 6px; font-size: 13px; font-weight: bold; border: 1px solid #ccc; }
        #new-student-btn { background: #d32f2f; color: white; border: none; cursor: pointer; }

        /* Manual Voice Dropdown Styling */
        #voice-select { background: #e3f2fd; border-color: #2196f3; max-width: 150px; }

        #image-container { 
            flex: 2; display: flex; align-items: center; justify-content: center; 
            min-height: 80px; margin-bottom: 0.5vh; position: relative; overflow: hidden;
        }
        #word-image { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; display: none; }
        #fallback-text { font-size: 5vh; font-weight: bold; color: #444; display: none; }
        
        #answer-box, #scrambled-box { 
            min-height: 10vh; background: #fafafa; border: 1px solid #eee;
            border-radius: 10px; display: flex; justify-content: center; 
            align-items: center; gap: 8px; padding: 5px; flex-wrap: wrap;
        }
        #answer-box { border: 2px dashed #bbb; margin-bottom: 0.5vh; }
        #scrambled-box { margin-bottom: 0.5vh; }

        .letter-tile { 
            background-color: #e91e63; color: white; 
            font-size: clamp(16px, 4vh, 32px); padding: 1vh 2.5vw; 
            border-radius: 8px; cursor: pointer; user-select: none; 
            box-shadow: 0 4px 0 #ad1457; transition: 0.1s; 
        }
        .tile-correct { background-color: #34a853 !important; box-shadow: 0 4px 0 #2d8a46 !important; }
        .glow-success { border: 2.5px solid #34a853 !important; background-color: #f0fff4 !important; }

        .controls { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 0.5vh; }
        button { color: white; border: none; padding: 1vh 2vw; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 8px; }
        #back-btn { background: #607d8b; display: none; }
        #clear-btn { background: #f4b400; } 
        #skip-btn { background: #9c27b0; }
        #pronounce-btn { background: #1a73e8; } 
        #next-btn { background: #34a853; display: none; }

        .stats { display: flex; justify-content: space-around; font-size: 16px; font-weight: bold; padding: 5px; border-top: 1px solid #eee; }
        #marks-display { color: #d32f2f; }
        #voice-debug { font-size: 11px; color: #888; }
    </style>
</head>
<body onclick="kickstartSpeech()">

<div id="game-board">
    <div class="header-controls">
        <select id="lesson-select" onchange="changeLesson()">
            <option value="all">All Lessons</option>
            <option value="1">Lesson 1</option>
            <option value="4">Lesson 4</option>
        </select>
        <select id="level-select" onchange="loadWord()">
            <option value="1">Lvl 1</option>
            <option value="2">Lvl 2</option>
        </select>
        <select id="voice-select" onchange="manualVoiceSet()">
            <option value="">Select Voice</option>
        </select>
        <button id="new-student-btn" onclick="restartForNewStudent()">🔄 Reset</button>
    </div>
    <div id="image-container">
        <img id="word-image" src="">
        <div id="fallback-text"></div>
    </div>
    <div id="answer-box"></div>
    <div id="scrambled-box"></div>
    <div id="status-message" style="height:22px; font-size:16px; font-weight:bold; color:#d32f2f;"></div>
    <div class="controls">
        <button id="back-btn" onclick="prevWord()">⬅️</button>
        <button id="clear-btn" onclick="clearAnswer()">Clear</button>
        <button id="skip-btn" onclick="skipWord()">Skip ⏭️</button>
        <button id="pronounce-btn" onclick="pronounceWord()" disabled>🔊 Speak</button>
        <button id="next-btn" onclick="nextWord()">Next ➡️</button>
    </div>
    <div class="stats">
        <div id="word-count">1 / 139</div>
        <div id="marks-display">Marks: 0</div>
    </div>
    <div id="voice-debug">Click any tile to wake audio.</div>
</div>

<script>
    // Matra tile logic
    function segmentHindi(text) { return text.match(/[\u0900-\u094f\u0962-\u0963][\u093e-\u094c\u0962-\u0963\u0901-\u0903\u093a-\u093c]*|./g) || []; }

    const lessonsData = {
        1: { letters: ['अ', 'आ', 'न', 'म', 'र'], words: [{ img: "naman.jpg", hi: "नमन", en: "Greeting" }, { img: "anar.jpg", hi: "अनार", en: "Pomegranate" }] },
        4: { letters: ['ज', 'फ', 'ब', 'भ', 'ष', 'ऋ'], words: [{ img: "krishak.jpg", hi: "कृषक", en: "Farmer" }] }
    };

    let currentWordList = [], currentIndex = 0, currentMarks = 0, currentHindiWord = "", availableLetters = [], selectedLetters = [], solvedWordsGlobal = new Set();
    let synth = window.speechSynthesis;
    let manualVoice = null;

    function shuffleArray(a) { let s = [...a]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }

    function loadWord() {
        if (currentIndex >= currentWordList.length) return;
        const img = document.getElementById("word-image");
        const aBox = document.getElementById("answer-box");
        aBox.classList.remove("glow-success");
        img.style.display = "none"; img.src = "";
        document.getElementById("fallback-text").style.display = "none";

        currentHindiWord = currentWordList[currentIndex].hi;
        document.getElementById("word-count").innerText = `${currentIndex + 1} / ${currentWordList.length}`;
        document.getElementById("marks-display").innerText = `Marks: ${currentMarks}`;

        img.src = currentWordList[currentIndex].img;
        img.onload = () => { img.style.display = "inline-block"; };
        img.onerror = () => { document.getElementById("fallback-text").innerText = currentWordList[currentIndex].en; document.getElementById("fallback-text").style.display = "block"; };

        let correctTiles = segmentHindi(currentHindiWord);
        availableLetters = shuffleArray([...correctTiles]);
        if (document.getElementById("level-select").value === "2") {
            availableLetters.push(['क','ल','म'][Math.floor(Math.random()*3)]);
        }
        availableLetters = shuffleArray(availableLetters);
        selectedLetters = []; 
        document.getElementById("status-message").innerText = "";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("skip-btn").style.display = "inline-block";
        document.getElementById("back-btn").style.display = (currentIndex > 0) ? "inline-block" : "none";
        updateUI();
    }

    function moveLetter(index, fromAvailable) {
        if (fromAvailable) { selectedLetters.push(availableLetters[index]); availableLetters.splice(index, 1); }
        else { availableLetters.push(selectedLetters[index]); selectedLetters.splice(index, 1); }
        updateUI();
        if (selectedLetters.join("") === currentHindiWord) {
            if (!solvedWordsGlobal.has(currentHindiWord)) {
                currentMarks += (document.getElementById("level-select").value === "1" ? 2 : 4);
                solvedWordsGlobal.add(currentHindiWord);
                document.getElementById("answer-box").classList.add("glow-success");
                document.querySelectorAll("#answer-box .letter-tile").forEach(t => t.classList.add("tile-correct"));
                document.getElementById("next-btn").style.display = "inline-block";
                document.getElementById("skip-btn").style.display = "none";
            }
        } else if (selectedLetters.length === segmentHindi(currentHindiWord).length) {
            document.getElementById("status-message").innerText = "❌";
        }
    }

    function skipWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } }
    function nextWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } }
    function prevWord() { if (currentIndex > 0) { currentIndex--; loadWord(); } }
    function clearAnswer() { availableLetters = [...availableLetters, ...selectedLetters]; selectedLetters = []; updateUI(); }
    
    function updateUI() {
        const sBox = document.getElementById("scrambled-box"), aBox = document.getElementById("answer-box");
        sBox.innerHTML = ""; aBox.innerHTML = "";
        availableLetters.forEach((l, i) => { const d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = () => moveLetter(i, true); sBox.appendChild(d); });
        selectedLetters.forEach((l, i) => { const d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = () => moveLetter(i, false); aBox.appendChild(d); });
    }

    function changeLesson() {
        const sel = document.getElementById("lesson-select").value;
        if (sel === 'all') {
            currentWordList = []; Object.keys(lessonsData).forEach(k => currentWordList = [...currentWordList, ...lessonsData[k].words]);
        } else { currentWordList = shuffleArray(lessonsData[sel].words); }
        currentIndex = 0; loadWord();
    }

    function restartForNewStudent() { currentMarks = 0; solvedWordsGlobal.clear(); currentIndex = 0; changeLesson(); }

    // --- ENHANCED VOICE LOGIC ---
    function kickstartSpeech() { synth.speak(new SpeechSynthesisUtterance(" ")); }
    
    function loadVoices() {
        const voices = synth.getVoices();
        const vSelect = document.getElementById("voice-select");
        const hindiFound = voices.some(v => v.lang.includes('hi'));
        
        if (vSelect.options.length <= 1) {
            voices.forEach((v, i) => {
                const opt = document.createElement("option");
                opt.value = i;
                opt.innerText = `${v.name} (${v.lang})`;
                vSelect.appendChild(opt);
            });
        }

        if (hindiFound) { 
            document.getElementById("pronounce-btn").disabled = false;
            document.getElementById("voice-debug").innerText = "Hindi voice detected! ✔️";
        }
    }

    function manualVoiceSet() {
        const voices = synth.getVoices();
        const idx = document.getElementById("voice-select").value;
        if (idx !== "") {
            manualVoice = voices[idx];
            document.getElementById("pronounce-btn").disabled = false;
        }
    }

    synth.onvoiceschanged = loadVoices;

    function pronounceWord() {
        synth.cancel(); 
        const u = new SpeechSynthesisUtterance(currentHindiWord);
        if (manualVoice) { u.voice = manualVoice; }
        else { u.lang = 'hi-IN'; }
        u.rate = 0.8; 
        synth.speak(u);
    }

    window.onload = () => { changeLesson(); setTimeout(loadVoices, 1000); };
</script>
</body>
</html>
